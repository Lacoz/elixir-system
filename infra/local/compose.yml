# Local-only stack: mirrors production service topology (see AGENTS.md §14).
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: docker.io/hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  prometheus:
    image: docker.io/prom/prometheus:v2.50.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: docker.io/grafana/grafana:10.3.1
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  app:
    # Placeholder until the Mix release Containerfile exists; README maps app to :4000 on the host.
    image: docker.io/traefik/whoami:v1.10.4
    depends_on:
      - postgres
      - vault
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app_dev
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      CAPABILITY_ENV: dev
    ports:
      - "4000:80"

volumes:
  pg_data:
